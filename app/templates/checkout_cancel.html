{% extends "base.html" %}
{% block title %}{{ t('cancel.title') }} — {{ app_name }}{% endblock %}
{% block content %}
<section class="checkout-result">
  <h1>{{ t('cancel.h1') }}</h1>
  <p class="muted">{{ t('cancel.p') }}</p>
  {% if order %}<p><strong>{{ t('common.order_code') }}:</strong> {{ order.order_code }}</p>{% endif %}
  <p><a class="btn" href="/tickets">{{ t('cancel.retry') }}</a></p>
</section>
{% endblock %}
