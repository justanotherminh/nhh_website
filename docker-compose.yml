services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nhh
      POSTGRES_PASSWORD: nhh
      POSTGRES_DB: nhh
    ports:
      - "5433:5432"   # 5433 on host to avoid clashing with a native Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhh"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP (app sends here in dev)
      - "8025:8025"   # web UI to view captured e-tickets

volumes:
  postgres_data:
